# ════════════════════════════════════════════════════════════════
#  Sem Destino RP — server.cfg  (base limpa, versionado)
#  Segredos em server_secrets.cfg (git-ignored). Ver _SETUP.md.
# ════════════════════════════════════════════════════════════════

# ── Endpoints ───────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ── Segredos (ficheiro git-ignored) ─────────────────
exec server_secrets.cfg

# ── Identidade ──────────────────────────────────────
sv_hostname "Semdestino RP"
sets sv_projectName "Sem Destino"
sets sv_projectDesc "Servidor Semi-whitelist atraves do discord"
sets tags "portugal, pt, tuga, portugues, roleplay, rp, esx"
sets locale "pt-PT"
sets sv_lang "PT"
load_server_icon logo.png

# ── Plataforma ──────────────────────────────────────
set es_enableCustomData 1
set sv_enforceGameBuild "3570"
onesync on
onesync_forceMigration true
sv_maxclients 8
set mysql_slow_query_warning 200
set sv_endpointprivacy true
setr voice_use3dAudio false
setr voice_useSendingRangeOnly false

# ── Permissões / ACE ────────────────────────────────
#  cframework precisa de emitir comandos de gestão:
add_ace resource.cframework command.sets allow
add_ace resource.cframework command.add_principal allow
add_ace resource.cframework command.add_ace allow

#  Admins têm todos os comandos MENOS quit:
add_ace group.admin command allow
add_ace group.admin command.quit deny

#  CRASH FIX: o auto-restart emite "quit" a partir do recurso cframework;
#  o deny acima (group.admin) bloqueava-o → loop/crash. Este allow é
#  avaliado em separado (principal de recurso) e só afeta o cframework,
#  não os admins humanos.
add_ace resource.cframework command.quit allow

#  Outros:
add_ace superadmin command.devall allow
add_ace superadmin command.ACMenu allow
add_ace mod command.delallveh allow

# ── Admins (principals) ─────────────────────────────
add_principal identifier.discord:769177936787013652 group.admin   #JP
add_principal identifier.discord:792354210628632579 group.admin   #Chris


#exec permissions.cfg   # decidir na Fase 6 (atualmente default-deny)

