<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="bg"></div>
        <div class="vignette"></div>

        <!-- ░░ FASE 1 — IDENTIDADE ░░ -->
        <div id="screen-identity" class="screen panel">
            <div class="brand">
                <span class="brand-line"></span>
                <span class="brand-text">SEM&nbsp;DESTINO</span>
                <span class="brand-sub">ROLEPLAY</span>
            </div>

            <div class="steps"><span class="dot on"></span><span class="dot"></span></div>

            <h1>Criar Personagem</h1>
            <p class="lead">Define a tua identidade. Estes dados são permanentes.</p>

            <div class="field">
                <label>Sexo</label>
                <div class="seg" id="sex">
                    <button type="button" data-val="m" class="active">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M14 2h6v6m0-6L10 12M10 6H6a4 4 0 0 0-4 4v6a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Masculino
                    </button>
                    <button type="button" data-val="f">
                        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="8" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 13v8m-4-4h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        Feminino
                    </button>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Primeiro nome</label>
                    <input id="firstname" type="text" maxlength="20" placeholder="Ex.: João" autocomplete="off" spellcheck="false">
                </div>
                <div class="field">
                    <label>Apelido</label>
                    <input id="lastname" type="text" maxlength="20" placeholder="Ex.: Silva" autocomplete="off" spellcheck="false">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Data de nascimento</label>
                    <input id="dob" type="text" inputmode="numeric" maxlength="10" placeholder="DD/MM/AAAA" autocomplete="off">
                </div>
                <div class="field">
                    <label>Altura · <span id="hval">180</span> cm</label>
                    <input id="height" type="range" min="120" max="220" value="180" step="1">
                    <div class="range-scale"><span>120</span><span>220</span></div>
                </div>
            </div>

            <div class="err" id="err"></div>

            <button id="submit" class="cta">
                Continuar
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 12h14m-6-6 6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="hint">A seguir personalizas o visual.</div>
        </div>

        <!-- ░░ FASE 2 — APARÊNCIA ░░ -->
        <div id="screen-appearance" class="screen panel wide hidden">
            <div class="brand">
                <span class="brand-line"></span>
                <span class="brand-text">SEM&nbsp;DESTINO</span>
                <span class="brand-sub">ROLEPLAY</span>
            </div>

            <div class="steps"><span class="dot done"></span><span class="dot on"></span></div>

            <h1 class="sm">Personaliza o Visual</h1>

            <div class="cats" id="cats"></div>
            <div class="components" id="components"></div>

            <div class="appfoot">
                <div class="rotate">
                    <button class="rbtn" id="rotL" title="Rodar esquerda">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 14 4 9l5-5M4 9h11a5 5 0 0 1 5 5v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <span>Rodar</span>
                    <button class="rbtn" id="rotR" title="Rodar direita">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="m15 14 5-5-5-5M20 9H9a5 5 0 0 0-5 5v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
                <button id="finish" class="cta">
                    Finalizar Personagem
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
