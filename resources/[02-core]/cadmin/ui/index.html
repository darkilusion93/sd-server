<html>

<head>
	<link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="style.css">
	<script src="nui://game/ui/jquery.js" type="text/javascript"></script>

	<style>#admin,#exist { display: none; }</style>

	<script type="text/javascript">
		let selected = 0;
        let sortType = 'id'; // Default sort type
		let sortedData = {}
		$(function () {
			$('.users2').on('click', '.spec', function(){

				let target = $(this).data('spectate');

				let player = $('.spectate').attr('id');

				if (target == player) {
					//alert("You can't spectate yourself !");
				} else {
					$('.spectate').fadeOut();
					$.post('http://gadmin/select', JSON.stringify({id: target}));
				}

			});

			$('.users2').on('click', '.kick', function(){

				let target = $(this).data('kick');

				let reason = prompt("KICK REASON", "Pseudo RP SVP");

				if (reason == null || reason == "") {
					//alert("MISSING KICK REASON")
				} else {
					$('.spectate').fadeOut();
					$.post('http://gadmin/kick', JSON.stringify({id: target, reason: reason}));
				}
			});

			$('.header').on('click', '#close2', function(){
				$('.spectate').fadeOut();
				$.post('http://gadmin/quit');
			});

            $('.header').on('click', '#sort', function(){
				sortType = (sortType === 'id') ? 'playtime' : 'id'; // Toggle sort type

                $("#sort").text(sortType === 'id' ? 'ID' : 'Playtime'); // Update button text

                populate(sortedData);
			});

			$("#myInput").on("keyup", function() {
				$('.spectate .users2').html('');
				var value = $(this).val().toLowerCase();
				let searchData = sortedData.filter(el => { return el.name.toLowerCase().includes(value) || `${el.id}`.includes(value) || value === '' })

				for (var i = 0; i < searchData.length; i++) {
					let id = searchData[i].id;
					let name = searchData[i].name;

					let element = 	'<div class="user2">' +
										'<span class="user-id">' + id + '</span>' +
										'<span class="user-name">' + name + '</span>' +
										'<span class="user-actions">' +
											'<button class="spec" data-spectate="' + id + '">Spectate</button>' +
										'</span>' +
									'</div>';

					$('.spectate .users2').append(element);
				}
			});

			$(document).keyup(function (e) {
				if (e.keyCode == 27) {
					$("#admin").fadeOut();
					$('.spectate').fadeOut();
					$.post('http://gadmin/close2');
					$.post('http://gadmin/close', JSON.stringify({}));
				}
			});

			window.addEventListener('message', function (event) {
				if (event.data.type == "open") {
					$('#notexist').css('display', 'block');
					$('#exist').css('display', 'none');
					$("#admin").fadeIn();
					$('input').val("");

					$('#list').empty();
					for (let i in event.data.players) {
						let player = event.data.players[i];
						$('#list').append('<div class="player" id="player_' + player.id + '">' + player.name + '</div>');
					}

					$(".player").click(function () {
						let id = $(this).attr('id').replace('player_', '');
						selected = parseInt(id);

						$('.player').removeClass('selected');
						$(this).addClass('selected');

						$('#exist').find('h1').text(selected + ", " + $(this).text());

						$('#notexist').css('display', 'none');
						$('#exist').css('display', 'block');
					});
				}
				if (event.data.type == "show"){
					let data = event.data.data;
					let player = event.data.player;
					$('.spectate').attr('id', player);
					populate(data);
					setTimeout(function(){
						$('.spectate').fadeIn();
					}, 200)
				}
			});

			$("#close").click(() => {
				$("#admin").fadeOut();
				$.post('http://gadmin/close', JSON.stringify({}));
			});

			$("#select_users").click(() => {
				$('#server').css('display', 'none');
				$('#users').css('display', 'block');
				$(".tab").removeClass("selected");
				$("#select_users").addClass("selected");
				$("#select_users").blur();
			});

			//$("#select_server").click(() => {
			//	$('#users').css('display', 'none');
			//	$('#server').css('display', 'block');
			//	$(".tab").removeClass("selected");
			//	$("#select_server").addClass("selected");
			//	$("#select_server").blur();
			//});

			//$("#slay_all").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'slay_all' })); $(this).blur(); });
			//$("#bring_all").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'bring_all' })); $(this).blur(); });
			//$("#slap_all").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'slap_all' })); $(this).blur(); });


			$("#slay").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'slay' })); $(this).blur(); });
			$("#kick").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'kick' })); $(this).blur(); });
			$("#noclip").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'noclip' })); $(this).blur(); });
			$("#freeze").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'freeze' })); $(this).blur(); });
			$("#bring").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'bring' })); $(this).blur(); });
			$("#goto").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'goto' })); $(this).blur(); });
			$("#slap").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'slap' })); $(this).blur(); });
			$("#crash").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'crash' })); $(this).blur(); });
			$("#ban").click(function () { $.post('http://gadmin/quick', JSON.stringify({ id: selected, type: 'ban' })); $(this).blur(); });
			$("#setgroup").click(function () { $.post('http://gadmin/set', JSON.stringify({ user: selected, type: 'group', param: $("#newgroup").val() })); $(this).blur(); });
			$("#setlevel").click(function () { $.post('http://gadmin/set', JSON.stringify({ user: selected, type: 'level', param: $("#newlevel").val() })); $(this).blur(); });
			$("#setmoney").click(function () { $.post('http://gadmin/set', JSON.stringify({ user: selected, type: 'money', param: $("#newmoney").val() })); $(this).blur(); });
			$("#setbank").click(function () { $.post('http://gadmin/set', JSON.stringify({ user: selected, type: 'bank', param: $("#newbank").val() })); $(this).blur(); });

			$('button').click(function () { $(this).blur(); });
		});

		function populate(data){
			$('.spectate .users2').html('');

			data.sort(function(a, b) {
				let idA = sortType === "id" ? parseInt(a.id) : parseInt(a.playtime);
                let idB = sortType === "id" ? parseInt(b.id) : parseInt(b.playtime);

				if (idA < idB)
					return -1 
				if (idA > idB)
					return 1
				return 0
			});

			sortedData = data

			var value = $("#myInput").val().toLowerCase();
            let searchData = sortedData.filter(el => { return el.name.toLowerCase().includes(value) || `${el.id}`.includes(value) || value === '' })

			for (var i = 0; i < searchData.length; i++) {
				let id = searchData[i].id;
				let name = searchData[i].name;

				let element = 	'<div class="user2">' +
									'<span class="user-id">' + id + '</span>' +
									'<span class="user-name">' + name + '</span>' +
									'<span class="user-actions">' +
										'<button class="spec" data-spectate="' + id + '">Spectate</button>' +
									'</span>' +
								'</div>';

				$('.spectate .users2').append(element);
			}

		}
	</script>
</head>

<body>
	<div class="spectate">
		<div class="header"><input id="myInput" type="text" placeholder="Procura..."><span id="sort" class="sorter">ID</span><i class="fa fa-times" id="close2"></i></div>
		<div class="users2"></div>
	</div>

	<div id="admin">
		<div class="topbar">
			<p>es_admin</p>
			<div id="close">&#10060;</div>
		</div>

		<div id="tabs">
			<button id="select_users" class="tab selected">Jogadores</button>
			<!--<button id="select_server" class="tab">Servidor</button>-->
		</div>

		<div id="main">
			<div id="users">
				<div id="list">
				</div>
				<div id="selected">
					<div id="notexist">
						<h1>Escolher Jogador</h1>
					</div>
					<div id="exist">
						<h1>Kanersps</h1>
						<div id="quick">
							<h3>Opções</h3>
							<button class="quick" id="slay">Suicidar</button>
							<button class="quick" id="kick">Dar kick</button>
							<button class="quick" id="noclip">Noclip</button>
							<button class="quick" id="freeze">Freeze</button>
							<button class="quick" id="bring">Bring</button>
							<button class="quick" id="goto">Goto</button>
							<button class="quick" id="slap">Slap</button>
							<button class="quick" id="crash">Crashar</button>
							<button class="quick" id="ban">Banir</button>
						</div>
						<div id="set">
							<h3>Atribuir</h3>
							<div class="group_set">
								<label>Grupo</label>
								<input id="newgroup" type="text" placeholder="Novo Grupo"></input>
								<button id="setgroup">Setar</button>
							</div>
							<div class="group_set">
								<label>Nivel de Permissão </label>
								<input id="newlevel" type="text" placeholder="Nova Permissão"></input>
								<button id="setlevel">Setar</button>
							</div>
							<div class="group_set">
								<label>Dinheiro</label>
								<input id="newmoney" type="text" placeholder="Novo Dinheiro"></input>
								<button id="setmoney">Setar</button>
							</div>
							<div class="group_set">
								<label>Dinheiro do Banco</label>
								<input id="newbank" type="text" placeholder="Novo Dinheiro do Banco"></input>
								<button id="setbank">Setar</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
